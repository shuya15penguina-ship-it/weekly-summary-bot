<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ "グループを追加" if is_new else "グループを編集" }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1e1f22; color: #dbdee1; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 32px 16px; }
    .back { color: #949ba4; font-size: 0.875rem; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    .back:hover { color: #dbdee1; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 28px; }
    .card { background: #2b2d31; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { font-size: 1rem; font-weight: 600; color: #fff; border-bottom: 1px solid #3f4147; padding-bottom: 8px; margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #b5bac1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="text"], input[type="number"], select { width: 100%; background: #1e1f22; border: 1px solid #3f4147; border-radius: 6px; color: #dbdee1; padding: 8px 12px; font-size: 0.9rem; margin-bottom: 16px; }
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-bottom: 8px; }
    .channel-item { display: flex; align-items: center; gap: 8px; background: #1e1f22; border-radius: 6px; padding: 8px 12px; cursor: pointer; }
    .channel-item:hover { background: #35373c; }
    .channel-item input[type="checkbox"] { accent-color: #5865f2; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .channel-item span::before { content: "# "; color: #949ba4; }
    .schedule-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .btn-row { display: flex; gap: 12px; }
    .btn { border: none; border-radius: 6px; padding: 10px 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-primary { background: #5865f2; color: #fff; }
    .btn-primary:hover { background: #4752c4; }
    .btn-secondary { background: #4e5058; color: #dbdee1; }
    .btn-secondary:hover { background: #6d6f78; }
  </style>
</head>
<body>
<div class="container">
  <a href="/" class="back">← 一覧に戻る</a>
  <h1>{{ "グループを追加" if is_new else "「" + group.name + "」を編集" }}</h1>

  <form method="post" action="/groups/save">
    <input type="hidden" name="group_id" value="{{ group.id }}">

    <div class="card">
      <h2>基本設定</h2>
      <label>グループ名</label>
      <input type="text" name="name" value="{{ group.name }}" placeholder="例: 開発チーム" required>

      <label>対象サーバー</label>
      <select name="guild_id" id="guild_select" onchange="filterChannels()">
        {% for g in guilds_channels %}
        <option value="{{ g.id }}" {% if g.id == (group.guild_id|string) %}selected{% endif %}>{{ g.name }}</option>
        {% endfor %}
      </select>

      <label>サマリー送信先チャンネル</label>
      <select name="output_channel_id" id="output_select">
        {% for g in guilds_channels %}
          {% for ch in g.channels %}
          <option value="{{ ch.id }}" data-guild="{{ g.id }}"
            {% if ch.id == (group.output_channel_id|string) %}selected{% endif %}>
            #{{ ch.name }}
          </option>
          {% endfor %}
        {% endfor %}
      </select>
    </div>

    <div class="card">
      <h2>集計対象チャンネル</h2>
      <div class="channel-grid" id="channel_grid">
        {% for g in guilds_channels %}
          {% for ch in g.channels %}
          <label class="channel-item" data-guild="{{ g.id }}">
            <input type="checkbox" name="target_channel_ids" value="{{ ch.id }}"
              {% if ch.id|int in group.target_channel_ids %}checked{% endif %}>
            <span>{{ ch.name }}</span>
          </label>
          {% endfor %}
        {% endfor %}
      </div>
    </div>

    <div class="card">
      <h2>送信スケジュール（JST）</h2>
      <div class="schedule-row">
        <div>
          <label>曜日</label>
          <select name="schedule_day">
            {% for d in [("monday","月曜"),("tuesday","火曜"),("wednesday","水曜"),("thursday","木曜"),("friday","金曜"),("saturday","土曜"),("sunday","日曜")] %}
            <option value="{{ d[0] }}" {% if group.schedule_day == d[0] %}selected{% endif %}>{{ d[1] }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label>時（0〜23）</label>
          <input type="number" name="schedule_hour" min="0" max="23" value="{{ group.schedule_hour }}">
        </div>
        <div>
          <label>分（0〜59）</label>
          <input type="number" name="schedule_minute" min="0" max="59" value="{{ group.schedule_minute }}">
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button type="submit" class="btn btn-primary">💾 保存</button>
      <a href="/" class="btn btn-secondary">キャンセル</a>
    </div>
  </form>
</div>

<script>
const allChannelItems = Array.from(document.querySelectorAll('#channel_grid [data-guild]'));
const allOutputOptions = Array.from(document.querySelectorAll('#output_select option[data-guild]'));

function filterChannels() {
  const guildId = document.getElementById('guild_select').value;
  allChannelItems.forEach(el => el.style.display = el.dataset.guild === guildId ? '' : 'none');
  allOutputOptions.forEach(opt => opt.style.display = opt.dataset.guild === guildId ? '' : 'none');
}
filterChannels();
</script>
</body>
</html>
